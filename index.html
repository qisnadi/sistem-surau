<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Tempahan Surau Ar-Raudhah V2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans" x-data="surauApp()">

    <!-- Header -->
    <header class="bg-emerald-600 text-white shadow-md p-4 sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="bg-white p-1 rounded-full shadow-inner flex items-center justify-center w-12 h-12 overflow-hidden border border-emerald-500/20">
                <img src="https://lh3.googleusercontent.com/d/14O68NMQSwWdvZLpuCII9GGvTQgzGyoLL" alt="Logo" class="w-full h-full object-contain" onerror="this.onerror=null; this.src='https://placehold.co/100x100?text=SKTBK';">
            </div>
            <div>
                <h1 class="text-base md:text-lg font-extrabold leading-none">SURAU AR-RAUDHAH V2</h1>
                <p class="text-[10px] md:text-xs font-semibold text-emerald-100 mt-1">SK TG BATU KERAMAT, TAWAU</p>
            </div>
        </div>
        <div>
            <button x-show="!isAdmin" @click="logMasukAdmin()" class="bg-emerald-700 hover:bg-emerald-800 px-3 py-1.5 rounded-lg text-sm font-semibold transition">Log Masuk Admin</button>
            <div x-show="isAdmin" class="flex items-center space-x-3">
                <span class="bg-red-500 text-xs px-2 py-1 rounded-full text-white font-bold animate-pulse">ADMIN</span>
                <button @click="isAdmin = false" class="bg-gray-700 hover:bg-gray-800 px-3 py-1.5 rounded-lg text-sm font-semibold transition">Keluar</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 md:p-6 space-y-6">
        <!-- Loading -->
        <div x-show="loading" class="fixed inset-0 bg-black/30 backdrop-blur-xs flex items-center justify-center z-50" x-cloak>
            <div class="bg-white p-4 rounded-xl shadow-md flex items-center space-x-3">
                <div class="w-6 h-6 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                <span class="text-sm font-semibold">Memproses data...</span>
            </div>
        </div>

        <!-- Dashboard & Kalendar -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <section class="bg-white rounded-2xl shadow-sm p-5 md:col-span-2 flex flex-col justify-center border border-gray-100">
                <h2 class="text-sm font-bold text-gray-700 mb-2">📅 Pilih Tarikh Tempahan:</h2>
                <input type="date" x-model="tarikhDipilih" @change="kemaskiniSlot()" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 text-lg">
            </section>
            <section class="bg-gradient-to-br from-emerald-700 to-emerald-900 rounded-2xl text-white p-5 flex flex-col justify-between shadow-md">
                <div>
                    <h3 class="text-xs uppercase font-bold text-emerald-200">Analisis Bulan Ini</h3>
                    <div class="text-3xl font-black mt-1" x-text="totalTempahanBulanIni + ' Kali'">0 Kali</div>
                </div>
                <div class="text-[11px] text-emerald-100/80 border-t border-emerald-600/50 pt-2 mt-2">
                    <div>🔥 Tertinggi: <span class="font-bold text-white" x-text="kelasTertinggi"></span></div>
                </div>
            </section>
        </div>

        <!-- Jadual Slot -->
        <section class="bg-white rounded-2xl shadow-sm p-5 border border-gray-100">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="text-sm font-bold text-emerald-800">Senarai Slot: <span class="text-gray-900" x-text="formatTarikh(tarikhDipilih)"></span></h3>
                <div class="flex gap-2 text-[10px] font-bold">
                    <span class="bg-gray-100 px-2 py-0.5 rounded border">Kosong</span>
                    <span class="bg-yellow-400 text-gray-900 px-2 py-0.5 rounded">Menunggu</span>
                    <span class="bg-red-500 text-white px-2 py-0.5 rounded">Penuh</span>
                </div>
            </div>

            <!-- Grid Slot yang PASTI KELUAR -->
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                <template x-for="(slot, index) in senaraiSlot" :key="index">
                    <div :class="{
                            'bg-red-500 text-white border-red-500 shadow-md': slot.status === 'penuh',
                            'bg-amber-400 text-gray-900 border-amber-400': slot.status === 'menunggu',
                            'bg-gray-100 text-gray-400 border-gray-200 opacity-60 cursor-not-allowed': slot.status === 'terlepas',
                            'bg-white text-gray-700 border-gray-200 hover:border-emerald-500 hover:bg-emerald-50/50 cursor-pointer': slot.status === 'kosong'
                         }"
                         class="border p-4 rounded-xl transition flex flex-col justify-between min-h-[100px]"
                         @click="klikSlot(index)">
                        
                        <div class="flex justify-between items-start w-full">
                            <span class="text-sm font-bold" x-text="slot.masa"></span>
                            <span class="text-[9px] px-1.5 py-0.5 rounded font-bold uppercase" :class="slot.status === 'penuh' ? 'bg-red-700 text-white' : 'bg-gray-200 text-gray-700'">
                                <span x-text="slot.status === 'penuh' ? 'Penuh' : (slot.status === 'menunggu' ? 'Menunggu' : (slot.status === 'terlepas' ? 'Lepas' : 'Kosong'))"></span>
                            </span>
                        </div>

                        <div x-show="slot.info" class="text-xs mt-2 p-1.5 rounded bg-black/5 border border-black/10">
                            <div class="truncate"><strong>Oleh:</strong> <span x-text="slot.info.nama"></span></div>
                            <div class="truncate"><strong>Kelas:</strong> <span x-text="slot.info.kelas"></span></div>
                        </div>
                    </div>
                </template>
            </div>
        </section>
    </main>

    <!-- MODAL (BORANG TEMPAHAN / EDIT) -->
    <div x-show="bukaModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50" x-cloak>
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl space-y-4" @click.away="bukaModal = false">
            <h3 class="text-md font-bold border-b pb-2" x-text="isEditMode ? 'Urus Slot (Admin)' : 'Tempahan Baru'"></h3>
            
            <div class="space-y-3 text-sm">
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">Nama Guru:</label>
                    <input type="text" x-model="borang.nama" class="w-full p-2 border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">Kelas:</label>
                    <select x-model="borang.kelas" class="w-full p-2 border rounded-lg bg-white text-sm">
                        <option value="">-- Pilih --</option>
                        <option value="Gabungan Khas Tahap 1 (Thn 1,2,3)">Gabungan Khas Tahap 1</option>
                        <option value="Gabungan Khas Tahap 2 (Thn 4,5,6)">Gabungan Khas Tahap 2</option>
                        <option value="Aktiviti Guru / Kakitangan">Aktiviti Guru</option>
                        <option value="Tahun 4">Tahun 4</option>
                        <option value="Tahun 5">Tahun 5</option>
                        <option value="Tahun 6">Tahun 6</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">Tujuan / Aktiviti:</label>
                    <textarea x-model="borang.tujuan" rows="2" class="w-full p-2 border rounded-lg text-sm"></textarea>
                </div>
            </div>

            <div class="flex flex-col gap-2 pt-2 border-t text-xs">
                <div x-show="isEditMode" class="space-y-2 w-full" x-cloak>
                    <button @click="sahkanStatusMenunggu()" x-show="statusAsalBagiSlotEdit === 'menunggu'" class="w-full bg-green-600 text-white font-bold p-2 rounded-lg">✓ Sahkan Kelulusan</button>
                    <button @click="padamSlotEditAdmin()" class="w-full bg-red-600 text-white font-bold p-2 rounded-lg">🗑️ Padam Tempahan</button>
                </div>
                <div x-show="!isEditMode" class="flex space-x-2 w-full">
                    <button @click="bukaModal = false" class="w-1/2 bg-gray-100 p-2 rounded-lg">Batal</button>
                    <button @click="hantarTempahan()" class="w-1/2 bg-emerald-600 text-white font-bold p-2 rounded-lg">Hantar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwvnggiM2Z01ciW6csQ037FhktyXQPrFsbc0a4y_Zba8gE0jUIBybS_hNSnxQmCsJebkw/exec';
        
        function surauApp() {
            const slotAsas = [
                { masa: "06:30 - 07:00", mula: 390 }, { masa: "07:00 - 07:30", mula: 420 },
                { masa: "07:30 - 08:00", mula: 450 }, { masa: "08:00 - 08:30", mula: 480 },
                { masa: "08:30 - 09:00", mula: 510 }, { masa: "09:00 - 09:30", mula: 540 },
                { masa: "09:30 - 10:00", mula: 570 }, { masa: "10:20 - 10:50", mula: 620 },
                { masa: "10:50 - 11:20", mula: 650 }, { masa: "11:20 - 11:50", mula: 680 },
                { masa: "11:50 - 12:20", mula: 710 }, { masa: "12:20 - 12:50", mula: 740 }
            ];

            function dapatkanTarikhLokal() {
                let d = new Date();
                let offset = d.getTimezoneOffset();
                let mY = new Date(d.getTime() - (offset*60*1000) + (8*60*60*1000)); 
                return mY.toISOString().split('T')[0];
            }

            return {
                tarikhDipilih: dapatkanTarikhLokal(),
                senaraiSlot: [],
                dbData: [],
                isAdmin: false, loading: false, bukaModal: false, isEditMode: false,
                slotDipilihIndex: null, slotDipilihMasa: '', statusAsalBagiSlotEdit: '',
                borang: { nama: '', kelas: '', tujuan: '' },
                totalTempahanBulanIni: 0, kelasTertinggi: '-',

                async init() {
                    // Paksa bina slot kosong dulu supaya skrin TIADA KOSONG sementara tunggu cloud muat turun data
                    this.binaSlotKosongAsas();
                    await this.muatDataDariGoogle();
                },

                binaSlotKosongAsas() {
                    this.senaraiSlot = slotAsas.map(s => ({ ...s, status: 'kosong', info: null }));
                },

                async muatDataDariGoogle() {
                    this.loading = true;
                    try {
                        let respon = await fetch(GOOGLE_SCRIPT_URL);
                        this.dbData = await respon.json();
                        this.kemaskiniSlot();
                    } catch (e) { console.error(e); } finally { this.loading = false; }
                },

                kemaskiniSlot() {
                    let dataHariIni = {};
                    if(Array.isArray(this.dbData)) {
                        this.dbData.forEach(item => {
                            let tRef = item.tarikh ? item.tarikh.split('T')[0] : '';
                            if (tRef === this.tarikhDipilih) {
                                dataHariIni[item.indexSlot] = item;
                            }
                        });
                        this.totalTempahanBulanIni = this.dbData.length;
                    }

                    let sekarang = new Date();
                    let minitSemasa = (sekarang.getHours() * 60) + sekarang.getMinutes();
                    let hriIni = dapatkanTarikhLokal();

                    this.senaraiSlot = slotAsas.map((slot, index) => {
                        if (dataHariIni[index]) {
                            let sReal = dataHariIni[index].statusLulus === 'menunggu' ? 'menunggu' : 'penuh';
                            return { ...slot, status: sReal, info: dataHariIni[index] };
                        }
                        if (this.tarikhDipilih === hriIni && minitSemasa >= slot.mula) {
                            return { ...slot, status: 'terlepas', info: null };
                        }
                        return { ...slot, status: 'kosong', info: null };
                    });
                },

                klikSlot(index) {
                    let slot = this.senaraiSlot[index];
                    if (slot.status === 'terlepas') return;
                    this.slotDipilihIndex = index;
                    this.slotDipilihMasa = slot.masa;

                    if (slot.status === 'penuh' || slot.status === 'menunggu') {
                        if (!this.isAdmin) { alert(`Slot diboking oleh ${slot.info.nama}`); return; }
                        this.isEditMode = true;
                        this.statusAsalBagiSlotEdit = slot.status;
                        this.borang = { nama: slot.info.nama, kelas: slot.info.kelas, tujuan: slot.info.tujuan };
                        this.bukaModal = true;
                    } else {
                        this.isEditMode = false;
                        this.borang = { nama: '', kelas: '', tujuan: '' };
                        this.bukaModal = true;
                    }
                },

                async hantarTempahan() {
                    this.loading = true; this.bukaModal = false;
                    try {
                        await fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: "simpan", tarikh: this.tarikhDipilih, indexSlot: this.slotDipilihIndex,
                                masa: this.slotDipilihMasa, nama: this.borang.nama, kelas: this.borang.kelas,
                                tujuan: this.borang.tujuan, statusLulus: this.isAdmin ? 'lulus' : 'menunggu'
                            })
                        });
                        await this.muatDataDariGoogle();
                    } catch(e) { console.error(e); } finally { this.loading = false; }
                },

                async padamSlotEditAdmin() {
                    if(!confirm("Padam slot ini?")) return;
                    this.loading = true; this.bukaModal = false;
                    try {
                        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "padam", tarikh: this.tarikhDipilih, indexSlot: this.slotDipilihIndex }) });
                        await this.muatDataDariGoogle();
                    } catch(e) { console.error(e); } finally { this.loading = false; }
                },

                logMasukAdmin() { if (prompt("Katalaluan Admin:") === "admin123") this.isAdmin = true; },
                formatTarikh(s) { return s ? new Date(s).toLocaleDateString('ms-MY', { day: 'numeric', month: 'short', year: 'numeric' }) : ''; }
            }
        }
    </script>
</body>
</html>
